# Benchmark: Private Markets Domain Accuracy
# Domain: Quality / Domain Accuracy
# Applies to: Research, Valuation, and Analysis agents in private markets context

id: BENCH-DOMAIN-PM-001
name: private-markets-domain-accuracy
version: "1.0.0"
domain: Quality
description: >
  Evaluates the accuracy of AI outputs on private markets domain tasks including
  financial analysis, company research, and investment terminology. Compared
  against ground truth established by senior investment professionals.

applicable_to:
  artifact_types: [Agent, Workflow]
  conditions:
    - field: tags.asset_class
      operator: in
      values: [private-equity, venture-capital, credit, real-assets]

dataset:
  id: ds-private-markets-qa-v2
  description: "Ground truth Q&A dataset for private markets domain evaluation"
  size: 1200
  categories:
    - financial_statement_analysis    # 300 questions with ground truth answers
    - investment_terminology          # 200 questions
    - market_multiples_interpretation # 200 questions
    - fund_structure_mechanics        # 200 questions
    - regulatory_requirements_pe_vc   # 150 questions
    - valuation_methodology           # 150 questions
  ground_truth_source: "Senior Investment Professionals (min 10 years PE/VC experience)"
  last_updated: "2026-02-01"

metrics:
  - id: factual_accuracy
    description: "% of answers that are factually correct per ground truth"
    higher_is_better: true
    passing_threshold: 0.85

  - id: financial_precision
    description: "% of financial figures within 5% of correct value"
    higher_is_better: true
    passing_threshold: 0.90

  - id: terminology_correctness
    description: "% of domain terminology used correctly"
    higher_is_better: true
    passing_threshold: 0.92

  - id: hallucination_rate
    description: "% of responses containing ungrounded fabricated information"
    higher_is_better: false
    passing_threshold: 0.03   # max 3% hallucination rate

evaluation_methodology:
  runner: automated
  model_judge: claude-sonnet-4-6
  human_expert_review: true
  human_reviewer_profile: "Private markets professional, min 8 years experience"
  human_review_sample_size: 100  # random sample of 100 for human review

owner: evaluation-team
subject_matter_experts:
  - name: "Investment Committee Representative"
    role: "Ground truth validation"
last_reviewed: "2026-01-15"
