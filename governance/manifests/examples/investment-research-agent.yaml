# Example: Investment Research Agent Manifest
# This is a worked example of a real governance manifest for a production agent.
# Use this as a reference when completing your own manifest.

apiVersion: governance.platform/v1
kind: AgentManifest

metadata:
  canonical_name: "acme.research.investment-analyst-v2"
  display_name: "Investment Research Analyst Agent"
  version: "2.1.0"
  description: >
    AI agent that assists investment analysts in conducting company research for
    private equity due diligence. Synthesizes information from company filings,
    financial databases, and news sources to produce structured research summaries.
    Does NOT make investment recommendations — produces research inputs for human
    analyst review. Output is always reviewed by a senior analyst before use
    in investment committee materials.

ownership:
  business_owner:
    name: "Sarah Chen"
    email: "s.chen@acme-capital.com"
  technical_owner:
    name: "James Okonkwo"
    email: "j.okonkwo@acme-capital.com"
  owning_team: "research-team"
  owning_tenant: "acme-capital"

classification:
  agent_type: Research
  use_case: >
    Supports investment analysts during the initial due diligence phase of private
    equity deals. Analyzes target company financials, management team, market position,
    and competitive landscape. Produces structured research summaries that analysts
    use as starting points, not final conclusions.
  target_users:
    - Investment Analysts
    - Senior Associates
  autonomy_level: HumanOnLoop
  # Human analysts review all outputs before they enter investment materials.
  # The agent autonomously searches and synthesizes but cannot file, send, or act.

composition:
  primary_model: "claude-sonnet-4-6"
  fallback_models: ["gpt-4o"]
  tool_set:
    - "tool-sec-edgar-lookup"
    - "tool-financial-database-query"
    - "tool-news-search"
    - "tool-company-registry-lookup"
  knowledge_sources:
    - "ks-deal-templates-v1"
    - "ks-industry-frameworks-v2"
  prompt_set:
    - "prompt-research-system-v3"
    - "prompt-financial-analysis-v2"
    - "prompt-synthesis-v1"
  sub_agents: []

data_governance:
  data_classification: Confidential
  pii_handling:
    processes_pii: false
    # Target company management data is company information, not personal data
    # in the context of investment research
  mnpi_exposure: false
  # This agent does NOT have access to deal-specific systems; it uses public
  # and licensed data sources only. MNPI controls not required for this agent.
  data_retention_policy: "research-90-day"

risk:
  max_execution_depth: 8
  circuit_breaker:
    enabled: true
    error_threshold: 0.4
    time_window_seconds: 120
    cooldown_seconds: 600
  human_escalation:
    escalation_triggers:
      - "conflicting_information_detected"
      - "data_quality_concern"
      - "regulatory_filing_anomaly_detected"
    escalation_contact: "research-team-lead@acme-capital.com"

compliance:
  applicable_frameworks: [sr-11-7, finra-4511]
  regulatory_scope: "Investment Research Support"
  explainability_requirement: Basic

operational:
  sla:
    expected_p50_latency_ms: 8000
    expected_p99_latency_ms: 30000
  cost_controls:
    max_cost_per_execution_usd: 1.50
    monthly_budget_usd: 2000
  tags:
    environment: production
    team: research
    asset_class: private-equity
    phase: due-diligence
