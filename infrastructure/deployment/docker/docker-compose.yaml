# Docker Compose for local development and integration testing
# NOT for production use — production uses Kubernetes
# Starts all 13 governance services with their dependencies

version: "3.9"

services:

  # ── DEPENDENCIES ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: governance
      POSTGRES_USER: governance
      POSTGRES_PASSWORD: governance_dev_only
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./../../data-stores/governance-metadata/schema.sql:/docker-entrypoint-initdb.d/01-governance-metadata.sql
      - ./../../data-stores/audit-log/schema.sql:/docker-entrypoint-initdb.d/02-audit-log.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U governance"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  # ── GOVERNANCE SERVICES ───────────────────────────────────────────────────

  governance-gateway:
    build:
      context: ../../../platform/services/governance-gateway
    ports:
      - "8000:8000"
    environment:
      POLICY_SERVICE_URL: http://policy-service:8001
      REGISTRY_SERVICE_URL: http://registry-service:8002
      AUDIT_SERVICE_URL: http://audit-service:8003
      RISK_SERVICE_URL: http://risk-service:8004
      COMPLIANCE_SERVICE_URL: http://compliance-service:8005
      EVALUATION_SERVICE_URL: http://evaluation-service:8006
      APPROVAL_SERVICE_URL: http://approval-service:8007
      SECURITY_SERVICE_URL: http://security-service:8008
      OBSERVABILITY_SERVICE_URL: http://observability-service:8009
      LINEAGE_SERVICE_URL: http://lineage-service:8010
      NOTIFICATION_SERVICE_URL: http://notification-service:8011
      TENANT_MANAGEMENT_URL: http://tenant-management-service:8012
    depends_on:
      - policy-service
      - registry-service
      - audit-service

  policy-service:
    build:
      context: ../../../platform/services/policy-service
    ports:
      - "8001:8001"
    environment:
      POLICY_DB_URL: postgresql://governance:governance_dev_only@postgres:5432/governance
      REDIS_URL: redis://redis:6379/0
      AUDIT_SERVICE_URL: http://audit-service:8003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  registry-service:
    build:
      context: ../../../platform/services/registry-service
    ports:
      - "8002:8002"
    environment:
      REGISTRY_DB_URL: postgresql://governance:governance_dev_only@postgres:5432/governance
      RISK_SERVICE_URL: http://risk-service:8004
      EVALUATION_SERVICE_URL: http://evaluation-service:8006
      APPROVAL_SERVICE_URL: http://approval-service:8007
      AUDIT_SERVICE_URL: http://audit-service:8003
    depends_on:
      postgres:
        condition: service_healthy

  audit-service:
    build:
      context: ../../../platform/services/audit-service
    ports:
      - "8003:8003"
    environment:
      AUDIT_DB_URL: postgresql://governance:governance_dev_only@postgres:5432/governance
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  risk-service:
    build:
      context: ../../../platform/services/risk-service
    ports:
      - "8004:8004"
    environment:
      RISK_DB_URL: postgresql://governance:governance_dev_only@postgres:5432/governance
      AUDIT_SERVICE_URL: http://audit-service:8003
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy

  compliance-service:
    build:
      context: ../../../platform/services/compliance-service
    ports:
      - "8005:8005"
    environment:
      COMPLIANCE_DB_URL: postgresql://governance:governance_dev_only@postgres:5432/governance
    depends_on:
      postgres:
        condition: service_healthy

  evaluation-service:
    build:
      context: ../../../platform/services/evaluation-service
    ports:
      - "8006:8006"
    environment:
      EVAL_DB_URL: postgresql://governance:governance_dev_only@postgres:5432/governance
      AUDIT_SERVICE_URL: http://audit-service:8003
    depends_on:
      postgres:
        condition: service_healthy

  approval-service:
    build:
      context: ../../../platform/services/approval-service
    ports:
      - "8007:8007"
    environment:
      APPROVAL_DB_URL: postgresql://governance:governance_dev_only@postgres:5432/governance
      NOTIFICATION_SERVICE_URL: http://notification-service:8011
      AUDIT_SERVICE_URL: http://audit-service:8003
    depends_on:
      postgres:
        condition: service_healthy

  security-service:
    build:
      context: ../../../platform/services/security-service
    ports:
      - "8008:8008"
    environment:
      SECURITY_DB_URL: postgresql://governance:governance_dev_only@postgres:5432/governance
      AUDIT_SERVICE_URL: http://audit-service:8003
    depends_on:
      postgres:
        condition: service_healthy

  observability-service:
    build:
      context: ../../../platform/services/observability-service
    ports:
      - "8009:8009"
    environment:
      METRICS_DB_URL: postgresql://governance:governance_dev_only@postgres:5432/governance
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy

  lineage-service:
    build:
      context: ../../../platform/services/lineage-service
    ports:
      - "8010:8010"
    environment:
      LINEAGE_DB_URL: postgresql://governance:governance_dev_only@postgres:5432/governance
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: ../../../platform/services/notification-service
    ports:
      - "8011:8011"
    environment:
      NOTIFICATION_DB_URL: postgresql://governance:governance_dev_only@postgres:5432/governance
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy

  tenant-management-service:
    build:
      context: ../../../platform/services/tenant-management-service
    ports:
      - "8012:8012"
    environment:
      TENANT_DB_URL: postgresql://governance:governance_dev_only@postgres:5432/governance
      NOTIFICATION_SERVICE_URL: http://notification-service:8011
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
